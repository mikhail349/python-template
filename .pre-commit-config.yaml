repos:
-   repo: local
    hooks:
    -   id: isort
        name: isort
        entry: isort --check
        language: python
        types:
          - "python"

    -   id: black
        name: black
        entry: black --check
        language: python
        types:
          - "python"

    -   id: pylint
        name: pylint
        entry: pylint
        language: python
        types:
          - "python"